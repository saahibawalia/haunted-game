<!DOCTYPE html>
<html>
<head>
  <title>Haunted Mansion</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="game-container">
    <h1>Haunted Mansion</h1>

    <p id="health">Health: 100 ❤️</p>

    <p id="story">
      You stand outside a creepy mansion... Where do you go?
    </p>

    <div id="choices">
      <button onclick="chooseRoom('living')">Living Room</button>
      <button onclick="chooseRoom('dining')">Dining Room</button>
    </div>

    <button id="restart" onclick="restartGame()">Restart</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
